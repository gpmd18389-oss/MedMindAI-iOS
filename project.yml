name: MedMindAI
options:
  bundleIdPrefix: com.medmindai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_FILE: MedMindAI/Resources/Info.plist

targets:
  MedMindAI:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MedMindAI
        excludes:
          - "Resources/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medmindai.app
        INFOPLIST_FILE: MedMindAI/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: MedMindAI/Resources/Info.plist
      properties:
        UILaunchScreen: {}
