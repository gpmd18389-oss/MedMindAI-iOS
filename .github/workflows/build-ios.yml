name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications/ | grep Xcode

      - name: Select Xcode version
        run: |
          # Pick the latest Xcode 15.x or 16.x available
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          elif [ -d "/Applications/Xcode_15.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          elif [ -d "/Applications/Xcode_15.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.3.app/Contents/Developer
          elif [ -d "/Applications/Xcode.app" ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Build for iOS Simulator (unsigned)
        run: |
          # Find an available iPhone simulator
          SIM_NAME=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/^[[:space:]]*//' | cut -d'(' -f1 | xargs)
          SIM_OS=$(xcrun simctl list devices available | grep "iOS" | head -1 | sed 's/-- //' | sed 's/ --//' | xargs)
          echo "Using simulator: $SIM_NAME"
          echo "OS: $SIM_OS"

          xcodebuild build \
            -project MedMindAI.xcodeproj \
            -scheme MedMindAI \
            -destination "generic/platform=iOS Simulator" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Create unsigned IPA
        run: |
          APP_PATH=$(find build -name "MedMindAI.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r MedMindAI-unsigned.ipa Payload/
            rm -rf Payload
            ls -lh MedMindAI-unsigned.ipa
            echo "IPA created successfully"
          else
            echo "WARNING: .app not found"
            find build -name "*.app" -type d || true
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedMindAI-iOS-unsigned
          path: MedMindAI-unsigned.ipa
          if-no-files-found: warn

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: MedMindAI-iOS-app
          path: build/Build/Products/Release-iphonesimulator/MedMindAI.app
          if-no-files-found: warn
