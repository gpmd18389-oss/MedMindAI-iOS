name: Build iOS App

on:
  push:
    branches: [ main ]
    paths:
      - 'MedMindAI-iOS/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'MedMindAI-iOS/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  build-ios:
    runs-on: macos-14  # macOS Sonoma with Xcode 15
    defaults:
      run:
        working-directory: MedMindAI-iOS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator (unsigned)
        run: |
          xcodebuild build \
            -project MedMindAI.xcodeproj \
            -scheme MedMindAI \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.2' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty || true

      - name: Build .app bundle
        run: |
          xcodebuild build \
            -project MedMindAI.xcodeproj \
            -scheme MedMindAI \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned IPA (for sideloading)
        run: |
          APP_PATH=$(find build -name "MedMindAI.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r MedMindAI-unsigned.ipa Payload/
            rm -rf Payload
            echo "✅ IPA created: MedMindAI-unsigned.ipa"
          else
            echo "⚠️ .app not found, listing build dir:"
            find build -name "*.app" -type d
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedMindAI-iOS-unsigned
          path: MedMindAI-iOS/MedMindAI-unsigned.ipa
          if-no-files-found: warn

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: MedMindAI-iOS-app
          path: MedMindAI-iOS/build/Build/Products/Release-iphonesimulator/MedMindAI.app
          if-no-files-found: warn
